server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME type for the PWA manifest — nginx doesn't know this
    # extension by default and would otherwise serve it as
    # application/octet-stream, which some browsers reject for manifest
    # parsing.
     include /etc/nginx/mime.types;
    default_type application/octet-stream;
    types {
        application/manifest+json webmanifest;
    }

    # The service worker file itself must never be cached by the browser,
    # or PWA updates (new deploys) won't be picked up until a manual
    # hard-refresh — defeating the point of registerType: 'autoUpdate'.
    location ~* ^/(sw\.js|registerSW\.js|workbox-.*\.js)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback: any path not matching a real file goes to index.html
    # so React Router handles client-side routes like /manager, /reports.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Static assets are content-hashed by Vite, safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
